rules:
  # M1: Improper Credential Usage

  # Detect hardcoded variables by keywords (api, secret, token, etc.)
  - id: hardcoded-api-key
    patterns:
      - pattern: let $KEY = "..."
      - metavariable-regex:
          metavariable: "$KEY"
          regex: "(?i)(api|secret|token|password|key)"
    message: "Potential hardcoded credential detected (OWASP M1). Move secrets to a secure storage like Keychain or use Environment Variables."
    languages: [swift]
    severity: WARNING

  # Scan configuration files (.plist) for exposed tokens and keys
  - id: plist-hardcoded-secret
    patterns:
      - pattern-regex: '(?i)<key>.*(secret|token|password|key|aws).*</key>\s*<string>[^<]+</string>'
    message: "Improper Credential Usage (OWASP M1). Sensitive data or keys found in plist file. Attackers can easily extract these from the application bundle."
    languages: [generic]
    paths:
      include: ["*.plist"]
    severity: ERROR


  # M3: Insecure Authentication and Authorization

  # Detect biometric authentication relying solely on a boolean value
  - id: insecure-biometrics
    patterns:
      - pattern: $CONTEXT.evaluatePolicy(...)
    message: "Insecure Authentication (OWASP M3). Local authentication relies on boolean evaluation. Use Keychain Services with access control flags (SecAccessControl) to cryptographically bind session tokens to biometrics."
    languages: [swift]
    severity: WARNING

  # Detect parsing of JWT payload without verifying the cryptographic signature
  - id: jwt-unverified-signature
    patterns:
      - pattern: |
          let $SEGMENTS = $TOKEN.components(separatedBy: ".")
          ...
          let $PAYLOAD = $SEGMENTS[1]
          ...
    message: "Insecure Authorization (OWASP M3). Decoding JWT payload without verifying its cryptographic signature allows privilege escalation."
    languages: [swift]
    severity: ERROR

  # Find Keychain flags allowing data read even when the device is locked
  - id: insecure-keychain-accessibility
    patterns:
      - pattern-either:
          - pattern: kSecAttrAccessibleAlways
          - pattern: kSecAttrAccessibleAlwaysThisDeviceOnly
    message: "Insecure Authentication (OWASP M3). Using kSecAttrAccessibleAlways allows extraction of keychain items even when the device is locked."
    languages: [swift]
    severity: ERROR

  # Find weak Access Control Lists (ACL) allowing any enrolled fingerprints/faces
  - id: insecure-biometry-acl
    patterns:
      - pattern: ".biometryAny"
    message: "Insecure Authentication (OWASP M3). Using .biometryAny allows authentication with any enrolled biometric, including those added by an attacker after device compromise. Use .biometryCurrentSet."
    languages: [swift]
    severity: ERROR

  # Detect the use of hardware device identifiers for authentication
  - id: insecure-device-identifier
    patterns:
      - pattern: "UIDevice.current.identifierForVendor"
    message: "Insecure Authentication (OWASP M3). Device identifiers can be spoofed and should not be used for authentication or as session tokens."
    languages: [swift]
    severity: ERROR


  # M4: Insufficient Input/Output Validation

  # Detect direct string injection into WKWebView without validation (XSS)
  - id: insecure-webview-evaluation
    patterns:
      - pattern-inside: |
          $CODE = "... \($X) ..."
          ...
          $WEBVIEW.evaluateJavaScript($CODE, ...)
      - pattern: $WEBVIEW.evaluateJavaScript(...)
    message: "Insufficient Output Validation (OWASP M4). Executing unsanitized dynamic strings in WKWebView can lead to Cross-Site Scripting (XSS)."
    languages: [swift]
    severity: ERROR

  # Detect SQL queries built via string interpolation (SQLi)
  - id: sql-injection-swift
    patterns:
      - pattern-regex: '(?i)(SELECT|INSERT|UPDATE|DELETE).*\\\(.*?\)'
    message: "Insufficient Input Validation (OWASP M4). String interpolation in SQL queries leads to SQL Injection. Use parameterized queries instead."
    languages: [swift]
    severity: ERROR

  # Taint analysis track untrusted data from function arguments to WKWebView
  - id: tainted-webview-evaluation
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: "func $F(..., $ARG: String, ...) { ... }"
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern: $WEBVIEW.evaluateJavaScript(...)
    pattern-sanitizers:
      - pattern: sanitizeForHtml(...)
    message: "Taint Analysis (OWASP M4): Untrusted data flows from an external source into WKWebView evaluation without sanitization. This leads to XSS."
    languages: [swift]
    severity: ERROR

  # Taint analysis track untrusted data from function arguments to SQL queries
  - id: tainted-sql-injection
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: "func $F(..., $ARG: String, ...) { ... }"
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern-either:
          - pattern: '"SELECT ... \($X) ..."'
          - pattern: '"INSERT ... \($X) ..."'
          - pattern: '"UPDATE ... \($X) ..."'
          - pattern: '"DELETE ... \($X) ..."'
          - pattern-regex: '(?i)(SELECT|INSERT|UPDATE|DELETE).*\\\(.*?\)'
    message: "Taint Analysis (OWASP M4): Untrusted string variable flows directly into a SQL query interpolation. Use parameterized queries."
    languages: [swift]
    severity: ERROR

  # Taint analysis track user input flowing into file system paths (Path Traversal)
  - id: tainted-path-traversal
    mode: taint
    pattern-sources:
      - patterns:
          - pattern: "func $F(..., $ARG: String, ...) { ... }"
          - focus-metavariable: $ARG
    pattern-sinks:
      - pattern-either:
          - pattern: "FileManager.default.contents(atPath: $X)"
          - pattern: 'FileManager.default.contents(atPath: "\($X)")'
          - pattern: "$ANY_VAR.contents(atPath: $X)"
    message: "Insufficient Input Validation (OWASP M4). Untrusted input flows into FileManager, leading to Path Traversal vulnerabilities."
    languages: [swift]
    severity: ERROR


  # M5: Insecure Communication

  # Check for disabled App Transport Security mechanism (allowing HTTP traffic)
  - id: insecure-ats-configuration
    languages: [generic]
    patterns:
      - pattern: <key>NSAllowsArbitraryLoads</key><true/>
    message: "App Transport Security (ATS) is disabled (OWASP M5). This allows insecure HTTP connections."
    paths:
      include: ["*.plist"]
    severity: ERROR

  # Detect programmatic bypass of SSL certificate validation (.useCredential)
  - id: insecure-ssl-validation-bypass
    patterns:
      - pattern: "$HANDLER(.useCredential, ...)"
    message: "Insecure Communication (OWASP M5). Bypassing SSL validation allows Man-in-the-Middle (MITM) attacks. Remove this code before release."
    languages: [swift]
    severity: ERROR


  # M6: Insecure Authorization

  # Detect client-side hardcoded role checks that are easily bypassed in memory
  - id: insecure-local-authorization-role
    patterns:
      - pattern-either:
          - pattern: "$X == .admin"
          - pattern: "$X == .superuser"
          - pattern: "$X == \"admin\""
    message: "Insecure Authorization (OWASP M6). Client-side role checks can be bypassed by memory manipulation. Validate privileges on the server."
    languages: [swift]
    severity: ERROR


  # M9: Insecure Data Storage

  # Detect direct writing of data to files without encryption
  - id: insecure-local-storage
    patterns:
      - pattern: "$DATA.write(to: $URL, atomically: $BOOL, encoding: $ENC)"
    message: "Insecure Data Storage (OWASP M9). Writing data directly to the file system may expose sensitive information. Use Keychain or encrypted CoreData/Realm."
    languages: [swift]
    severity: ERROR

  # Detect the use of unencrypted UserDefaults storage for sensitive data
  - id: insecure-userdefaults
    patterns:
      - pattern: "UserDefaults.standard.set($VAL, forKey: $KEY)"
    message: "Insecure Data Storage (OWASP M9). UserDefaults stores data in plain text. Do not use it for passwords or tokens."
    languages: [swift]
    severity: WARNING

  # Prevent data leakage to the iOS global pasteboard
  - id: insecure-pasteboard
    patterns:
      - pattern: "UIPasteboard.general.string = $X"
    message: "Insecure Data Storage (OWASP M9). Sensitive data copied to the global pasteboard can be read by other applications."
    languages: [swift]
    severity: WARNING

  # Detect the use of weakly isolated App Groups shared containers
  - id: insecure-app-group
    patterns:
      - pattern: "UserDefaults(suiteName: $NAME)"
    message: "Insecure Data Storage (OWASP M9). App Groups (UserDefaults with suiteName) have lower isolation. Ensure sensitive data is encrypted before storing."
    languages: [swift]
    severity: WARNING


  # M10: Insufficient Cryptography

  # Block calls to the deprecated and broken MD5 hashing algorithm
  - id: insecure-md5-hashing
    patterns:
      - pattern: CC_MD5(...)
    message: "Insecure MD5 hashing detected (OWASP M10). MD5 is cryptographically broken and should not be used for sensitive data. Use CryptoKit and SHA-256 or stronger."
    languages: [swift]
    severity: ERROR

  # Detect the use of non-cryptographically secure random number generators
  - id: weak-rng
    patterns:
      - pattern-either:
          - pattern: "Int.random(...)"
          - pattern: "arc4random(...)"
          - pattern: "SystemRandomNumberGenerator(...)"
    message: "Insufficient Cryptography (OWASP M10). Weak random number generator detected. Use SecRandomCopyBytes or CryptoKit for security-sensitive values."
    languages: [swift]
    severity: ERROR

  # Detect hardcoded Initialization Vectors (IV) using regular expressions
  - id: hardcoded-iv
    patterns:
        - pattern-either:
          - pattern: let $IV = "..."
          - pattern: var $IV = "..."
          - pattern: let $IV = "...".$METHOD(...)
          - pattern: var $IV = "...".$METHOD(...)
          - pattern: let $IV = "...".$METHOD(...)!
          - pattern: var $IV = "...".$METHOD(...)!
          - metavariable-regex:
              metavariable: "$IV"
              regex: "(?i)(.*iv.*|.*initializationvector.*)"
    message: "Insufficient Cryptography (OWASP M10). Hardcoded Initialization Vector (IV) detected. IVs must be random and unique for each encryption session."
    languages: [ swift ]
    severity: ERROR